{% extends "base.html" %}

{% block content %}
<!-- Header Section -->
<div class="row mb-5">
    <div class="col-md-12 text-center">
        <h1 class="display-4 fw-bold text-gradient mb-3"><i class="fas fa-robot me-3"></i>Fitmetric Coach</h1>
        <p class="lead text-muted">Your 24/7 personal trainer. Ask me anything about diet, workouts, or recovery.</p>
    </div>
</div>

<div class="row justify-content-center mb-5">
    <div class="col-md-8">
        <div class="glass-card p-0" style="overflow: hidden; border: 1px solid rgba(112,0,255,0.3); box-shadow: 0 10px 40px rgba(112,0,255,0.15);">
            <div class="card-header border-bottom-0 py-3 px-4 d-flex align-items-center" style="background: rgba(112,0,255,0.1);">
                <div class="position-relative me-3">
                    <div class="rounded-circle d-flex justify-content-center align-items-center" style="width: 45px; height: 45px; background: linear-gradient(135deg, var(--secondary-color), var(--primary-color)); box-shadow: 0 0 15px rgba(0,242,255,0.4);">
                        <i class="fas fa-robot text-white fa-lg"></i>
                    </div>
                    <span class="position-absolute bottom-0 end-0 p-1 bg-success border border-dark rounded-circle" style="width: 12px; height: 12px;"></span>
                </div>
                <div>
                    <h5 class="mb-0 text-white fw-bold">Coach Titan</h5>
                    <small class="text-success fw-bold">Online</small>
                </div>
            </div>
            
            <div class="card-body p-0">
                <div id="chat-box" class="chat-container px-4 py-4" style="border: none; border-radius: 0; background: rgba(0,0,0,0.4); height: 500px;">
                    <div class="message bot d-flex align-items-start mb-3" style="box-shadow: none; background: none; padding: 0; max-width: 100%;">
                        <div class="rounded-circle d-flex justify-content-center align-items-center me-2 mt-1 flex-shrink-0" style="width: 30px; height: 30px; background: rgba(112,0,255,0.5);">
                            <i class="fas fa-robot text-white small"></i>
                        </div>
                        <div class="p-3 rounded" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-top-left-radius: 0; color: var(--text-main); font-size: 0.95rem;">
                            Hello! I'm your Fitmetric Coach. How can I help you crush your goals today?
                        </div>
                    </div>
                </div>
                
                <div class="p-3 border-top" style="background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.1) !important;">
                    <div class="input-group" style="background: rgba(0,0,0,0.5); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); padding: 5px;">
                        <input type="text" id="user-input" class="form-control border-0 bg-transparent text-white shadow-none px-4" placeholder="Type your message..." style="height: 45px;">
                        <button class="btn btn-primary rounded-pill px-4 fw-bold" id="send-btn" style="height: 45px; transition: all 0.2s ease;">
                            <i class="fas fa-paper-plane me-2"></i>Send
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function appendMessage(text, sender) {
        const wrapper = document.createElement('div');
        wrapper.classList.add('message', sender, 'd-flex', 'align-items-start', 'mb-3', sender === 'user' ? 'justify-content-end' : 'justify-content-start');
        wrapper.style.maxWidth = "100%";
        wrapper.style.boxShadow = "none";
        wrapper.style.background = "none";
        wrapper.style.padding = "0";

        let avatarHtml = '';
        let messageHtml = '';

        if (sender === 'bot') {
            avatarHtml = `
                <div class="rounded-circle d-flex justify-content-center align-items-center me-2 mt-1 flex-shrink-0" style="width: 30px; height: 30px; background: rgba(112,0,255,0.5);">
                    <i class="fas fa-robot text-white small"></i>
                </div>`;
            messageHtml = `
                <div class="p-3 rounded shadow-sm" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-top-left-radius: 0; color: var(--text-main); font-size: 0.95rem; max-width: 80%;">
                    ${text}
                </div>`;
            wrapper.innerHTML = avatarHtml + messageHtml;
        } else {
            messageHtml = `
                <div class="p-3 rounded shadow-sm" style="background: linear-gradient(135deg, var(--secondary-color), var(--primary-color)); color: white; border-top-right-radius: 0; font-size: 0.95rem; max-width: 80%;">
                    ${text}
                </div>`;
            avatarHtml = `
                <div class="rounded-circle d-flex justify-content-center align-items-center ms-2 mt-1 flex-shrink-0" style="width: 30px; height: 30px; background: rgba(255,255,255,0.1);">
                    <i class="fas fa-user text-white small"></i>
                </div>`;
            wrapper.innerHTML = messageHtml + avatarHtml;
        }

        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            appendMessage(data.response, 'bot');
        } catch (error) {
            appendMessage("Error connecting to server.", 'bot');
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
{% endblock %}
