{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-7">
        <div class="glass-card" style="box-shadow: 0 10px 40px rgba(0,0,0,0.5); border-top: 4px solid var(--success);">
            <div class="card-header text-center border-bottom-0 pt-4 pb-0 bg-transparent">
                <div class="d-inline-flex p-3 rounded-circle mb-3 align-items-center justify-content-center" style="background: rgba(0,255,157,0.1); width: 70px; height: 70px;">
                    <i class="fas fa-user-plus fa-2x text-success"></i>
                </div>
                <h3 class="fw-bold text-gradient mb-0" style="background: linear-gradient(45deg, var(--success), #a8ff78); -webkit-background-clip: text;">Join Fitmetric</h3>
                <p class="text-muted mt-2">Create your personalized fitness profile.</p>
            </div>
            <div class="card-body px-5 pb-5">
                {% if error %}
                <div class="alert alert-danger p-3 rounded mb-4 border-0" style="background: rgba(255, 71, 87, 0.1); color: var(--danger);"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>
                {% endif %}
                <form action="/register" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label text-muted small text-uppercase" style="letter-spacing: 1px;">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-color: rgba(255,255,255,0.1);"><i class="fas fa-user"></i></span>
                                <input type="text" name="name" class="form-control border-start-0 ps-0" required placeholder="John Doe" style="box-shadow: none;">
                            </div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label text-muted small text-uppercase" style="letter-spacing: 1px;">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-color: rgba(255,255,255,0.1);"><i class="fas fa-envelope"></i></span>
                                <input type="email" name="email" class="form-control border-start-0 ps-0" required placeholder="name@example.com" style="box-shadow: none;">
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted small text-uppercase" style="letter-spacing: 1px;">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-color: rgba(255,255,255,0.1);"><i class="fas fa-lock"></i></span>
                            <input type="password" name="password" class="form-control border-start-0 ps-0" required placeholder="••••••••" style="box-shadow: none;">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label text-muted small text-uppercase" style="letter-spacing: 1px;">Age</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-color: rgba(255,255,255,0.1);"><i class="fas fa-calendar-alt"></i></span>
                                <input type="number" name="age" class="form-control border-start-0 ps-0" required placeholder="e.g. 25" style="box-shadow: none;">
                            </div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label text-muted small text-uppercase" style="letter-spacing: 1px;">Gender</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-color: rgba(255,255,255,0.1);"><i class="fas fa-venus-mars"></i></span>
                                <select name="gender" class="form-select border-start-0 ps-0" style="box-shadow: none; background-image: none;">
                                    <option value="male" class="bg-dark">Male</option>
                                    <option value="female" class="bg-dark">Female</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label text-muted small text-uppercase" style="letter-spacing: 1px;">Height (cm)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-color: rgba(255,255,255,0.1);"><i class="fas fa-ruler-vertical"></i></span>
                                <input type="number" step="0.1" name="height" class="form-control border-start-0 ps-0" required placeholder="e.g. 175" style="box-shadow: none;">
                            </div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label text-muted small text-uppercase" style="letter-spacing: 1px;">Weight (kg)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-color: rgba(255,255,255,0.1);"><i class="fas fa-weight"></i></span>
                                <input type="number" step="0.1" name="weight" class="form-control border-start-0 ps-0" required placeholder="e.g. 70" style="box-shadow: none;">
                            </div>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="form-label text-muted small text-uppercase" style="letter-spacing: 1px;">Activity Level</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-muted" style="border-color: rgba(255,255,255,0.1);"><i class="fas fa-running"></i></span>
                            <select name="activity" class="form-select border-start-0 ps-0" style="box-shadow: none; background-image: none;">
                                <option value="sedentary" class="bg-dark">Sedentary (little or no exercise)</option>
                                <option value="lightly_active" class="bg-dark">Lightly Active (1-3 days/week)</option>
                                <option value="moderately_active" class="bg-dark">Moderately Active (3-5 days/week)</option>
                                <option value="very_active" class="bg-dark">Very Active (6-7 days/week)</option>
                                <option value="super_active" class="bg-dark">Super Active (physical job or 2x/day)</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold" style="font-size: 1.1rem; letter-spacing: 1px; background: linear-gradient(135deg, var(--success), #a8ff78); box-shadow: 0 4px 15px rgba(0, 255, 157, 0.3);">Create Account</button>
                </form>
                <div class="mt-4 text-center">
                    <p class="text-muted mb-0">Already have an account? <a href="/" class="text-success text-decoration-none fw-bold ms-1">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
